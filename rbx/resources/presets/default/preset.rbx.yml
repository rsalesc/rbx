---
# yaml-language-server: $schema=https://rsalesc.github.io/rbx/schemas/Preset.json
name: "default"
description: "rbx's default preset: ICPC-style problem/contest with testlib, jngen and tgen."
min_version: "0.38.0"
uri: "rsalesc/rbx/rbx/resources/presets/default"
problem: "problem"
contest: "contest"
env: "env.rbx.yml"
tracking:
  problem:
    - path: ".gitignore"
  contest:
    # The contest owns the statement chrome/templates (statements v2). Track the
    # shared LaTeX style so preset updates can refresh it; the templates
    # themselves are left untracked so user edits survive.
    - path: ".gitignore"
    - path: "statements/icpc.sty"
libraries:
  problem:
    - name: "testlib"
      source: "MikeMirzayanov/testlib"
      path: "testlib.h"
      version: "latest"
      dest: "testlib.h"
      always_include: true
    - name: "jngen"
      source: "ifsmirnov/jngen"
      path: "jngen.h"
      version: "latest"
      dest: "jngen.h"
      always_include: true
    - name: "tgen"
      source: "brunomaletta/tgen"
      path: "single_include/tgen.h"
      version: "latest"
      dest: "tgen.h"
      always_include: true
