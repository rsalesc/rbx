scenarios:
  - name: build-statement
    description: >
      Build the package and then build the rbxTeX statement. The
      mock_pdflatex fixture short-circuits the actual pdflatex run
      and yields an empty PDF, so we only assert the artefact path
      exists -- contents are not verified.
    steps:
      - cmd: build
      - cmd: st b
        expect:
          files_exist:
            - "build/main.pdf"

  - name: build-statement-missing-profile
    description: >
      Building with a non-existent timing profile must fail loudly so the
      user does not silently ship a statement rendered against the package
      defaults.
    steps:
      - cmd: st b -p does-not-exist
        expect_exit: 1
        expect:
          stdout_contains: "Limits profile"
