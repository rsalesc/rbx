name: mixed-solutions
timeLimit: 1000
memoryLimit: 256

generators:
  - name: gen
    path: gens/gen.cpp

solutions:
  - path: sols/main.cpp
    outcome: ac
  - path: sols/wa.cpp
    outcome: wa
  - path: sols/tle.cpp
    outcome: tle

testcases:
  - name: samples
    subgroups:
      - name: gen
        generators:
          - name: gen
            args: 1 2
  - name: main
    subgroups:
      - name: gen
        generators:
          - name: gen
            args: 3 4
          - name: gen
            args: 5 6
