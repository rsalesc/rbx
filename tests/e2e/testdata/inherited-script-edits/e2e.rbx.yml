scenarios:
  - name: promote-inherited
    description: >
      Promotion of a test generated by an INHERITED problem-level
      generatorScript (#601). grpa and grpb both inherit the shared
      @testgroup-partitioned script. Initially grpa has 2 script tests and grpb
      has 1. Promoting grpa/0 into the manual `corner` group moves that test:
      the @testgroup grpa line is removed from the shared script (so grpa drops
      to 1) and a static `corner/000.in` appears, while grpb's block is
      untouched. A removal scoped to a single group is allowed precisely because
      `@testgroup grpa` feeds only grpa.
    steps:
      - cmd: build
        expect:
          tests:
            groups:
              grpa: 2
              grpb: 1
            exist:
              - grpa/000.in
              - grpa/001.in
              - grpb/000.in
      - cmd: testcases promote grpa/0 --group corner
        expect_exit: 0
        expect:
          files_exist:
            - tests/manual/corner/000.in
          file_contains:
            tests/manual/corner/000.in: "1 1"
      - cmd: build
        expect:
          tests:
            groups:
              grpa: 1
              grpb: 1
              corner: 1
            exist:
              - corner/000.in
