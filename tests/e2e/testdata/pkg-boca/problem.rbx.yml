name: pkg-boca
timeLimit: 1000
memoryLimit: 256

# A cpp-specific limit override. The default preset aliases the rbx `cpp`
# language onto both BOCA variants `cc` and `cpp`, so both emitted limits
# scripts must reflect this modifier rather than the base limits (#493).
modifiers:
  cpp:
    time: 2000
    memory: 512

generators:
  - name: gen
    path: gens/gen.cpp

solutions:
  - path: sols/main.cpp
    outcome: ac

testcases:
  - name: main
    subgroups:
      - name: gen
        generators:
          - name: gen
            args: 1 2
          - name: gen
            args: 3 4
