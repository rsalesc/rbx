---
# yaml-language-server: $schema=https://rsalesc.github.io/rbx/schemas/Contest.json
# Add problems by running `rbx contest add`
name: "new-contest"
titles:
  en: "New contest"
# The contest owns the statement templates and chrome (under statements/).
statements:
  # Task sheet (the only statement that builds standalone with `rbx st b`).
  - name: "statement-en"
    language: "en"
    file: "statements/contest.rbx.tex"
    type: "rbxTeX"
    standaloneProblemTemplate: "statements/problem.rbx.tex"
    contestProblemTemplate: "statements/problem-fragment.rbx.tex"
  # Solutions sheet.
  - name: "editorial-en"
    language: "en"
    file: "statements/editorial-sheet.rbx.tex"
    type: "rbxTeX"
    contestProblemTemplate: "statements/editorial-fragment.rbx.tex"
    params:
      watermark: true
# Documents don't join problem statements, but can read problem metadata.
documents:
  # Information sheet: a per-problem limits table.
  - name: "info-en"
    language: "en"
    file: "statements/info.jinja.tex"
    type: "jinja-tex"
vars:
  year: 2025
  date: "2025-06-21"
