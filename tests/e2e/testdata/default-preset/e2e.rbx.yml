scenarios:
  - name: works
    seed_from_preset: default
    description: >
      Seeds the temp package from the real rbx default preset (problem package)
      at run time rather than copying it into the fixture, then verifies the
      preset builds its testset, builds its statement, and judges the reference
      solution as accepted.
    steps:
      - cmd: build
        expect:
          tests:
            groups:
              samples: 2
      - cmd: run
        expect:
          solutions:
            sols/main.cpp: ac
      - cmd: st b
        expect:
          files_exist:
            - build/statement-en.pdf
