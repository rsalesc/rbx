scenarios:
  - name: package-boca
    description: >
      Build the package, set up an inherited BOCA limits profile
      non-interactively, then produce the BOCA zip and assert the
      zip layout (description metadata, per-language limits, test
      I/O directories) is present.
    steps:
      - cmd: build
      - cmd: time -s inherit -p boca
      - cmd: pkg boca
        expect:
          files_exist:
            - "build/*.zip"
          zip_contains:
            path: build/*.zip
            entries:
              - description/problem.info
              - "input/*"
              - "output/*"
              - "limits/*"

  - name: package-boca-cc-cpp-limits
    description: >
      The default preset aliases the rbx `cpp` language onto both BOCA
      variants `cc` and `cpp`. The package's `cpp` limit modifier
      (time 2000ms, memory 512MB) must therefore apply to BOTH emitted
      `limits/` scripts. Before #493 the `cc` script missed the modifier
      and fell back to the base limits (1000ms / 256MB).

      The limits script echoes, in order: time (seconds), number of runs,
      memory (MB), output limit. Since #494 the time line is an EXACT
      fractional budget with no rounding, so a 2000ms TL emits `echo 2.000`
      over a single run (`echo 1`). One line-anchored regex per entry
      asserts the time line (`echo 2.000`), the run count (`echo 1`), and
      the memory line (`echo 512`, from the 512MB modifier). Before #493 the
      `cc` script echoed the base limits instead, so this regex fails to
      match a regression.
    steps:
      - cmd: build
      - cmd: time -s inherit -p boca
      - cmd: pkg boca
        expect:
          zip_file_contains:
            path: build/*.zip
            entries:
              limits/cpp: "/(?ms)^echo 2.000$.*^echo 1$.*^echo 512$/"
              limits/cc: "/(?ms)^echo 2.000$.*^echo 1$.*^echo 512$/"
