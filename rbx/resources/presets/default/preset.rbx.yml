---
# yaml-language-server: $schema=https://rsalesc.github.io/rbx/schemas/Preset.json
name: "default"
min_version: "0.37.1"
uri: "rsalesc/rbx/rbx/resources/presets/default"
problem: "problem"
contest: "contest"
env: "env.rbx.yml"
tracking:
  problem:
    - path: ".gitignore"
    - path: "documents/icpc.sty"
    - path: "documents/template.rbx.tex"
  contest:
    - path: ".gitignore"
    - path: "documents/icpc.sty"
    - path: "documents/template.rbx.tex"
    - path: "documents/contest.rbx.tex"
      symlink: true
