---
sandbox: "stupid"
timing:
  wallTimeMultiplier: 2.0
  wallTimeIncrement: 500
  groups:
    # c and cpp are left ungrouped: they share the leftover pool and are
    # estimated together from their accepted-solution timings.
    - languages: ["py"]
      whenEmpty: {relativeTo: "cpp", multiplier: 3.0}
    - languages: ["java", "kt"]
      whenEmpty: {relativeTo: "cpp", multiplier: 2.0}
defaultCompilation:
  sandbox:
    maxProcesses: 1000
    timeLimit: 50000 # 50 seconds
    wallTimeLimit: 50000 # 50 seconds
    memoryLimit: 1024 # 1gb
defaultExecution:
  sandbox:
    # Useful for checkers, validators, etc.
    timeLimit: 50000 # 50 seconds
    wallTimeLimit: 50000 # 50 seconds
    memoryLimit: 1024 # 1gb
languages:
  - name: "cpp"
    readableName: "C++20"
    extension: "cpp"
    compilation:
      commands: ["g++ -std=c++20 -O2 -o {executable} {compilable}"]
    execution:
      command: "./{executable}"
    linters: [testlib]
    scanners: [cpp]
    extensions:
      boca:
        languages: ["cc", "cpp"]
        template: "cc"
      polygon:
        polygonLanguage: "cpp.gcc13-64-winlibs-g++20"
  - name: "c"
    readableName: "C"
    extension: "c"
    compilation:
      commands: ["gcc -std=gnu11 -O2 -o {executable} {compilable} -lm"]
    execution:
      command: "./{executable}"
    scanners: [cpp]
    extensions:
      boca:
        languages: ["c"]
        template: "c"
  - name: "py"
    readableName: "Python3"
    extension: "py"
    execution:
      command: "python3 {executable}"
    scanners: [python]
    timing:
      wallTimeIncrement: 2000
    fileMapping:
      executable: "{compilable}"
    extensions:
      boca:
        languages: ["py3"]
        template: "py3"
  - name: "java"
    readableName: "Java"
    extension: "java"
    compilation:
      commands:
        - "javac -Xlint -encoding UTF-8 {compilable}"
        - "jar cvf {executable} @glob:*.class"
    execution:
      command: "java -Xss100m -Xmx{memory}m -Xms{initialMemory}m -cp {executable} {javaClass}"
    timing:
      wallTimeIncrement: 3000
    fileMapping:
      compilable: "{javaClass}.java"
      executable: "Main.jar"
    extensions:
      boca:
        languages: ["java"]
        template: "java"
      polygon:
        polygonLanguage: "java21"
  - name: "kt"
    readableName: "Kotlin"
    extension: "kt"
    compilation:
      commands:
        - "kotlinc -d {executable} -include-runtime {compilable}"
    execution:
      command: "java -Xss100m -Xmx{memory}m -Xms{initialMemory}m -cp {executable} MainKt"
    timing:
      wallTimeIncrement: 3000
    fileMapping:
      compilable: "Main.kt"
      executable: "Main.jar"
    extensions:
      boca:
        languages: ["kt"]
        template: "kt"
extensions:
  boca:
    flags:
      c: "-O2 -static"
      cc: "-std=c++20 -O2 -lm -static"
      cpp: "-std=c++20 -O2 -lm -static"
    preferContestLetter: true
    usePypy: false
